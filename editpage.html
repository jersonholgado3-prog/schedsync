<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1280" />
  <title>SchedSync — Edit Schedule</title>
  <link rel="stylesheet" href="maangas-styles.css">
  <link rel="stylesheet" href="header-styles.css">
  <link rel="stylesheet" href="export-styles.css">
  <script>
    (function () {
      // 1. Theme Lock 🌙
      const theme = localStorage.getItem("theme");
      if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }

      // 2. UI Mode Lock 👔
      const uiMode = localStorage.getItem("uiMode");
      const userRole = localStorage.getItem("userRole");
      const mode = uiMode || ((userRole === 'teacher' || userRole === 'admin') ? 'professional' : 'student');
      if (mode === 'professional') {
        document.documentElement.classList.add("professional-mode");
      }
    })();

    // Maangas Logic 🧠✨
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');

      // Update Atmospheric Effects immediately
      if (window.updateAtmosphere) window.updateAtmosphere();

      // Optional: Sound Effect? (Maybe later)
    }

    // Keyboard Shortcuts ðŸŽ¹
    document.addEventListener('keydown', (e) => {
      // Ctrl/Cmd + M for Theme Mode ðŸŒ™
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'm') {
        e.preventDefault();
        toggleTheme();
      }

      // Ctrl/Cmd + S for Save ðŸ’¾
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
        e.preventDefault();
        // Check if save function exists globally
        if (window.save) {
          window.save();
          // Visual Feedback
          const saveBtn = document.querySelector('.btn.save');
          if (saveBtn) {
            saveBtn.style.transform = 'scale(0.95)';
            setTimeout(() => saveBtn.style.transform = '', 150);
          }
        }
      }

      // Esc to Close Panel âŒ
      if (e.key === 'Escape') {
        if (window.closePanel) window.closePanel();
      }
    });
  </script>

  <link rel="stylesheet" href="editpage.css">
  <script type="module" src="ui-effects.js"></script>
</head>

<body class="custom-scroll">
  <div class="container">
    <aside class="sidebar">
      <div class="sidebar-header" onclick="window.location.href='homepage.html'"><img src="images/LOGO.png"
          class="logo-img"></div>
      <nav class="sidebar-menu"><a href="homepage.html" class="sidebar-link"><img src="images/home.png"
            alt="Home"><span>Home</span></a><a href="newschedule.html" class="sidebar-link"><img
            src="images/ADD_SCHED.png" alt="New Schedule"><span>New Schedule</span></a><a href="myschedule.html"
          class="sidebar-link"><img src="images/SCHED.png" alt="Schedules"><span>Schedules</span></a><a
          href="facultypage.html" class="sidebar-link"><img src="images/FACULTY.png"
            alt="Faculty"><span>Faculty</span></a><a href="campuspage.html" class="sidebar-link"><img
            src="images/CAMPUS_ONE.png" alt="Campus"><span>Campus</span></a><a href="event.html"
          class="sidebar-link"><img src="images/EVENT_MODE.png" alt="Events"><span>Events</span></a></nav>
    </aside>
    <div class="main-content-wrapper">
      <div class="page">
        <header class="header">
          <div class="left-header">
            <div class="hamburger-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
              </svg></div>
            <div class="logo-container" onclick="window.location.href='homepage.html'"><img src="images/BANNER.png"
                class="logo-img" alt="SchedSync Logo" style="max-height: 100%; width: 100%; object-fit: contain;"></div>
            <div class="search-wrapper"><img src="images/SEARCH.png" class="search-icon" alt="Search"><input type="text"
                class="search-button" placeholder="e.g. MATH 101" aria-label="Search"></div>
          </div>
          <div class="page-title">Edit Schedule</div>
          <div class="user-section">
            <button id="requestPermissionBtnHeader" class="download-all-header-btn"
              onclick="window.requestEditPermission()" style="display: none;">
              <span>REQUEST ACCESS</span>
            </button>
            <button class="download-all-header-btn" onclick="downloadAll()" style="display: none;">
              <span>DOWNLOAD ALL</span>
              <span class="btn-emoji">💾</span>
            </button>
            <div class="notification-icon-wrapper" onclick="window.openGameNotifications()"><img src="images/BELL.png"
                alt="Notifications"></div>
            <div class="user-profile-btn" id="userProfile"><span class="burger-icon">☰</span>
              <div class="user-name">User</div>
              <div class="user-avatar" id="headerAvatar"><svg xmlns="http://www.w3.org/2000/svg" fill="none"
                  viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 32px; height: 32px;">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M15.75 6.75a3.75 3.75 0 1 1 -7.5 0 3.75 3.75 0 0 1 7.5 0zM4.5 20.25a8.25 8.25 0 0 1 15 0" />
                </svg></div>
            </div>
          </div>
        </header>
        <div class="main">
          <div class="schedule-wrap">
            <div class="table-scroll">
              <table>
                <colgroup>
                  <!-- Dynamically generated in JS -->
                </colgroup>
                <thead>
                  <tr>
                    <!-- Dynamically generated in JS -->
                  </tr>
                </thead>
                <tbody id="tbody"></tbody>
              </table>
            </div>
          </div>
          <!-- Panel Overlay Removed for scrollability po ! 🌊 -->
          <aside class="panel" id="panel">
            <h2>Edit Class</h2><label>Subject</label>
            <div class="input-wrapper"><input id="subject" class="pill" placeholder="e.g. MATH 101" autocomplete="off">
              <div id="subject-dropdown" class="custom-dropdown"></div>
            </div><label>Teacher</label>
            <div class="input-wrapper"><input id="teacher" class="pill" placeholder="Search teacher..."
                autocomplete="off">
              <div id="teacher-dropdown" class="custom-dropdown"></div>
            </div><label>Room</label>
            <div class="input-wrapper"><input id="room" class="pill" placeholder="Search room..." autocomplete="off">
              <div id="room-dropdown" class="custom-dropdown"></div>
            </div><label>Color</label>
            <div class="row" style="align-items: center; margin-bottom: 10px;"><select id="colorSelect" class="pill"
                onchange="window.handleColorSelect()" style="flex: 1;">
                <option value="" style="background-color: #93c5fd; color: #1e3a8a;">Default (Blue)</option>
                <option value="#86efac" style="background-color: #86efac; color: #000;">Mint Green</option>
                <option value="#fca5a5" style="background-color: #fca5a5; color: #000;">Soft Red</option>
                <option value="#fcd34d" style="background-color: #fcd34d; color: #000;">Warm Yellow</option>
                <option value="#c4b5fd" style="background-color: #c4b5fd; color: #000;">Lavender</option>
                <option value="#fdba74" style="background-color: #fdba74; color: #000;">Orange</option>
                <option value="custom" style="background-color: #fff; color: #000;">Custom...</option>
              </select><input type="color" id="colorPicker" value="#dbeafe"
                style="height: 45px; width: 60px; padding: 0; border: none; background: none; cursor: pointer; display: none;"
                onchange="window.handleColorPicker()"></div><label>Start Time</label>
            <div class="row"><input id="start" class="pill" placeholder="HH:MM" style="flex: 1;"><select id="startAMPM"
                class="pill" style="flex: 0.8;">
                <option>AM</option>
                <option>PM</option>
              </select></div><label>End Time</label>
            <div class="row">
              <input id="end" class="pill" placeholder="HH:MM" style="flex: 1;">
              <select id="endAMPM" class="pill" style="flex: 0.8;">
                <option>AM</option>
                <option>PM</option>
              </select>
            </div>
            
            <!-- SMART CONFLICT SUGGESTIONS AREA (Now Blue & Smooth) 🛡️⚓ -->
            <div id="conflictSuggestionsArea" style="display: none; margin-top: 15px; margin-bottom: 20px; background: #eff6ff; border: 3px solid #3b82f6; border-radius: 20px; padding: 18px;">
              <h4 style="font-size: 0.85rem; font-weight: 900; color: #1e3a8a; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 8px;">
                <span style="font-size: 1.2rem;">✨</span> SMART RECOMMENDATIONS
              </h4>
              <div id="suggestedRoomsCont" style="margin-bottom: 15px;">
                <div style="font-size: 0.7rem; font-weight: 800; color: #2563eb; text-transform: uppercase; margin-bottom: 6px; opacity: 0.8;">Available Rooms:</div>
                <div id="roomSuggestions" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
              </div>
              <div id="suggestedTeachersCont">
                <div style="font-size: 0.7rem; font-weight: 800; color: #2563eb; text-transform: uppercase; margin-bottom: 6px; opacity: 0.8;">Available Teachers:</div>
                <div id="teacherSuggestions" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
              </div>
            </div>

            <div class="footer"><button class="btn save" onclick="window.saveClass()">Save</button><button
                class="btn comment-switch-btn" onclick="window.switchToComments()"><span
                  style="font-size: 16px;">💬</span>Comments</button><button class="btn vacant-btn"
                onclick="window.markAsVacant()">Vacant</button><button class="btn delete" id="deleteBtn"
                onclick="window.deleteClass()"
                style="background-color: #ef4444; color: white; display: none;">Delete</button><button
                class="btn cancel" onclick="window.closePanel()">Cancel</button></div>
          </aside>
          <!-- Comment Panel po ! 💬 -->
          <aside class="panel" id="commentPanel">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
              <div
                style="background: #1e293b; width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: 2px solid black; box-shadow: 2px 2px 0px black;">
                <span style="font-size: 20px;">💬</span>
              </div>
              <h2 style="margin: 0; text-align: left; flex: 1;">Class Comment</h2><button class="btn"
                onclick="window.openCommentPanel(document.getElementById('commentPanel').dataset.schedId, document.getElementById('commentPanel').dataset.day, document.getElementById('commentPanel').dataset.block, 'refresh')"
                style="padding: 5px 10px; font-size: 10px; background: #e2e8f0; border: 1px solid black; border-radius: 8px;">Refresh</button>
            </div>
            <div id="commentClassDetails"
              style="background: white; border: 2px solid black; border-radius: 20px; padding: 15px; margin-bottom: 20px; box-shadow: 3px 3px 0px black;">
              <div
                style="font-size: 0.75rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 4px;">
                Time & Section</div>
              <div id="commentCellInfo" style="font-weight: 900; font-size: 1rem; margin-bottom: 10px;">Monday 7:30
                AM - 9:00 AM </div>
              <div
                style="font-size: 0.75rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 4px;">
                Subject</div>
              <div id="commentSubjInfo" style="font-weight: 700; margin-bottom: 8px;">--</div>
              <div
                style="font-size: 0.75rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 4px;">
                Teacher & Room</div>
              <div id="commentTchRoomInfo" style="font-weight: 700;">--</div>
            </div>
            <!-- Existing Comments Container po ! 📜 -->
            <div id="commentList" class="custom-scroll"
              style="margin-bottom: 20px; max-height: 400px; overflow-y: auto;">
              <!-- Comments will be injected here po ! -->
            </div>
            <div id="commentInputArea"><label id="commentInputLabel">Your Comment</label><textarea id="commentText"
                class="pill" placeholder="Type your suggestion or note here..."
                style="min-height: 100px; text-transform: none; margin-top: 8px; margin-bottom: 20px; width: 100%; box-sizing: border-box;"></textarea>
            </div>
            <div class="footer"><button class="btn cancel" onclick="window.closeCommentPanel()">Cancel</button><button
                class="btn back-to-edit-btn" onclick="window.switchToEdit()"
                style="display: none; background: #FFD200; color: #002044; border: 3px solid black; box-shadow: 4px 4px 0px black; border-radius: 12px; font-weight: 800; padding: 10px 18px; transition: all 0.2s;"><span
                  style="display: flex; align-items: center; gap: 8px;"><img
                    src="https://img.icons8.com/ios-filled/50/002044/edit--v1.png"
                    style="width: 18px; height: 18px;">Back to Edit </span></button><button class="btn comment-submit"
                style="background: #1e293b; color: white; font-weight: 700;" onclick="window.submitComment()">Post
                Comment</button></div>
          </aside>
        </div>
        <!-- end .main po ! -->
      </div>
      <!-- end .page po ! -->
      <div class="mobile-overlay"></div>
      <script src="toast.js"></script>
      <script type="module" src="role-restriction.js"></script>
      <script type="module" src="./editpage.js"></script>
      <script type="module" src="realtime-notifications.js"></script>
      <script type="module" src="ui-effects.js"></script>

    </div>

</body>

</html>
