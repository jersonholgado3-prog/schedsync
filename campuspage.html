<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus - Room Information</title>
  <link rel="stylesheet" href="header-styles.css" />
  <script>
    (function () {
      // 1. Theme Lock 🌙
      const theme = localStorage.getItem("theme");
      if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
        document.documentElement.classList.add("dark");
      }

      // 2. UI Mode Lock 👔
      const uiMode = localStorage.getItem("uiMode");
      const userRole = localStorage.getItem("userRole");
      const mode = uiMode || ((userRole === 'teacher' || userRole === 'admin') ? 'professional' : 'student');
      if (mode === 'professional') {
        document.documentElement.classList.add("professional-mode");
      }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="campuspage_styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body class="bg-white text-black font-bold">
  <div class="container">
    <!-- HEADER -->
    <aside class="sidebar">
      <div class="sidebar-header" onclick="window.location.href='homepage.html'">
        <img src="images/LOGO.png" alt="Logo">
      </div>
      <nav class="sidebar-menu">
        <a href="homepage.html" class="sidebar-link">
          <img src="images/HOME.png" alt="Home">
          <span>Home</span>
        </a>
        <a href="myschedule.html" class="sidebar-link">
          <img src="images/SCHED.png" alt="My Schedule">
          <span>My Schedule</span>
        </a>
        <a href="facultypage.html" class="sidebar-link">
          <img src="images/FACULTY.png" alt="Faculty">
          <span>Faculty</span>
        </a>
        <a href="campuspage.html" class="sidebar-link active">
          <img src="images/CAMPUS_ONE.png" alt="Campus">
          <span>Campus</span>
        </a>
        <a href="sectionspage.html" class="sidebar-link">
          <img src="images/SECTIONS.png" alt="Sections">
          <span>Sections</span>
        </a>
        <a href="event.html" class="sidebar-link">
          <img src="images/EVENT_MODE.png" alt="Events">
          <span>Events</span>
        </a>
        <a href="curriculumpage.html" class="sidebar-link">
          <img src="images/CURRICULUM.png" alt="Curriculum">
          <span>Curriculum</span>

        <!-- ADMIN ONLY 🛡️ -->
        <div id="adminSidebarLinks" style="display: none;">
          <a href="archives.html" class="sidebar-link">
            <img src="images/ARCHIVE.png" alt="Archives">
            <span>Archives</span>
          </a>
          <a href="audit_logs.html" class="sidebar-link">
            <img src="images/AUDIT.png" alt="Audit">
            <span>Audit Logs</span>
          </a>
        </div>
      </nav>
    </aside>

    <div class="main-content-wrapper">
      <!-- HEADER -->
      <header class="header">
        <div class="left-header">
          <div class="hamburger-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </div>
          <div class="logo-container" onclick="window.location.href='homepage.html'">
            <img src="images/BANNER.png" class="logo-img" alt="SchedSync Logo"
              style="max-height: 100%; width: 100%; object-fit: contain;">
          </div>
          <div class="search-wrapper">
            <img src="images/SEARCH.png" class="search-icon" alt="Search">
            <input type="text" class="search-button" placeholder="Search" aria-label="Search">
          </div>
        </div>

        <div class="page-title">Campus</div>

        <div class="user-section">

          <div class="notification-icon-wrapper" onclick="window.openGameNotifications()">
            <img src="images/BELL.png" alt="Notifications">
          </div>
          <div class="user-profile-btn" id="userProfile">
            <span class="burger-icon">☰</span>
            <div class="user-name">User</div>
            <div class="user-avatar" id="headerAvatar">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                stroke="currentColor" style="width: 32px; height: 32px;">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15.75 6.75a3.75 3.75 0 1 1 -7.5 0 3.75 3.75 0 0 1 7.5 0zM4.5 20.25a8.25 8.25 0 0 1 15 0" />
              </svg>
            </div>
          </div>
        </div>
      </header>

      <div class="main-layout">
        <main class="flex-1 space-y-6 md:space-y-12 p-4 md:p-10"> <!-- Maximize mobile space 📐 -->
          <!-- CLASSROOMS -->
          <section>
            <div class="flex justify-between items-center mb-4 ml-2">
              <h2 class="text-2xl">Classrooms</h2>
              <div class="flex gap-2 items-center">
                <button id="selectModeBtn" class="hidden items-center gap-2 px-4 py-2 text-sm font-bold border-2 border-black rounded-xl shadow-[2px_2px_0px_black] hover:shadow-none hover:translate-x-[2px] hover:translate-y-[2px] transition-all active:scale-95 bg-white dark:bg-gray-800"
                  onclick="toggleSelectMode()">☑️ Select</button>
                <button id="roomImportDocBtn"
                  class="flex items-center gap-2 px-4 py-2 text-sm font-bold border-2 border-black rounded-xl shadow-[2px_2px_0px_black] hover:shadow-none hover:translate-x-[2px] hover:translate-y-[2px] transition-all active:scale-95 bg-white dark:bg-gray-800">
                  📂 Import Rooms
                </button>
                <input type="file" id="roomDocImportInput" accept=".xlsx,.csv,.pdf,.docx,.doc" style="display:none">
              </div>
            </div>
            <div class="space-y-8">
              <!-- 1st and 2nd Floor Row -->
              <div id="card-floor-12" class="grid grid-cols-1 md:grid-cols-2 gap-8 campus-card items-stretch">
                <div id="panel-floor-1" class="md:border-r-2 md:border-black md:pr-8">
                  <h3 class="text-xl mb-4 text-center">1ST FLOOR</h3>
                  <div id="floor-1-dynamic" class="grid grid-cols-2 lg:grid-cols-3 gap-4"></div>
                </div>
                <div id="panel-floor-2">
                  <h3 class="text-xl mb-4 text-center">2ND FLOOR</h3>
                  <div id="floor-2-dynamic" class="grid grid-cols-2 lg:grid-cols-3 gap-4"></div>
                </div>
              </div>

              <!-- 3rd and 4th Floor Row -->
              <div id="card-floor-34" class="grid grid-cols-1 md:grid-cols-2 gap-8 campus-card items-stretch">
                <div id="panel-floor-3" class="md:border-r-2 md:border-black md:pr-8">
                  <h3 class="text-xl mb-4 text-center">3RD FLOOR</h3>
                  <div id="floor-3-dynamic" class="grid grid-cols-2 lg:grid-cols-3 gap-4"></div>
                </div>
                <div id="panel-floor-4">
                  <h3 class="text-xl mb-4 text-center">4TH FLOOR</h3>
                  <div id="floor-4-dynamic" class="grid grid-cols-2 lg:grid-cols-3 gap-4"></div>
                </div>
              </div>
            </div>
          </section>

        </main>
      </div>

      <!-- FLOATING ACTION BUTTON (Resized) -->
      <button
        class="fixed bottom-24 right-6 md:bottom-16 md:right-16 w-16 h-16 add-room-fab flex items-center justify-center text-3xl font-bold z-40"
        onclick="openAddRoomModal()">
        +
      </button>

      <!-- BULK DELETE BAR (admin only, shown in select mode) -->
      <div id="bulkDeleteBar" class="hidden fixed bottom-24 md:bottom-16 left-1/2 -translate-x-1/2 z-50 flex items-center gap-3 px-5 py-3 bg-white border-2 border-black rounded-2xl shadow-[4px_4px_0px_black]">
        <span id="bulkCount" class="font-bold text-sm">0 selected</span>
        <button onclick="selectAll()" id="selectAllBtn" class="px-4 py-2 text-sm font-bold border-2 border-black rounded-xl shadow-[2px_2px_0px_black] hover:shadow-none hover:translate-x-[2px] hover:translate-y-[2px] transition-all">Select All</button>
        <button onclick="bulkDeleteSelected()" class="px-4 py-2 bg-red-500 text-white text-sm font-bold border-2 border-black rounded-xl shadow-[2px_2px_0px_black] hover:shadow-none hover:translate-x-[2px] hover:translate-y-[2px] transition-all">🗑️ Delete</button>
        <button onclick="exitSelectMode()" class="px-4 py-2 text-sm font-bold border-2 border-black rounded-xl shadow-[2px_2px_0px_black] hover:shadow-none hover:translate-x-[2px] hover:translate-y-[2px] transition-all">Cancel</button>
      </div>

      <!-- ADD ROOM MODAL -->
      <div id="addRoomModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-[2000]">
        <div class="add-room-modal-box">
          <h2 class="text-2xl font-bold mb-6 text-center">Add New Room</h2>

          <div class="space-y-4">
            <div>
              <label class="block text-sm font-bold mb-2">Room Type</label>
              <select id="modalRoomType" class="modal-input" onchange="toggleFloorSelect()">
                <option value="classroom">Classroom</option>
                <option value="laboratory">Laboratory</option>
                <option value="kitchen">Kitchen</option>
                <option value="bar">Bar</option>
                <option value="pe">PE Area</option>
                <option value="court">Court</option>
                <option value="mph">MPH</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div id="floorSelectContainer">
              <label class="block text-sm font-bold mb-2">Floor</label>
              <select id="modalFloor" class="modal-input">
                <option value="1">1st Floor</option>
                <option value="2">2nd Floor</option>
                <option value="3">3rd Floor</option>
                <option value="4">4th Floor</option>
              </select>
            </div>

            <div>
              <label class="block text-sm font-bold mb-2">Room Name/Number</label>
              <input type="text" id="modalRoomName" placeholder="e.g. 101 or Computer Lab 1"
                class="modal-input outline-none">
            </div>

            <div class="flex gap-4 mt-8">
              <button onclick="closeAddRoomModal()" class="modal-btn-cancel">
                Cancel
              </button>
              <button id="saveRoomBtn" class="modal-btn-save">
                Save Room
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="role-restriction.js"></script>

    </a>
    <a href="event.html" class="mob-nav-item" data-page="event">
      <img src="images/EVENT_MODE.png" alt="Events"><span>Events</span>

    <a href="curriculumpage.html" class="mob-nav-item" data-page="curriculumpage">
