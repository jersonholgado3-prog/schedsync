  <script type="module" src="ui-effects.js"></script>
  <link rel="stylesheet" href="header-styles.css" />
  <script>
    (function () {
      // 1. Theme Lock 🌙
      const theme = localStorage.getItem("theme");
      if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
        document.documentElement.classList.add("dark");
      }

      // 2. UI Mode Lock 👔
      const uiMode = localStorage.getItem("uiMode");
      const userRole = localStorage.getItem("userRole");
      const mode = uiMode || ((userRole === 'teacher' || userRole === 'admin') ? 'professional' : 'student');
      if (mode === 'professional') {
        document.documentElement.classList.add("professional-mode");
      }
    })();
  </script>
  <link rel="stylesheet" href="eventpopup.css">
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React Scripts -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>

  <script type="module" src="role-restriction.js"></script>
  <script type="module" src="event.js"></script>
  <script type="module" src="eventmodal.js"></script>

  <!-- Modal Control Script -->
  <script>
    // Define globally so event scripts can attach to it without module scope issues
    window.openCreateEvent = () => {
      const modal = document.getElementById('createEventModal');
      console.log("Create Event button triggered");
      if (typeof window.renderEventModal === 'function') {
        modal.style.display = 'flex';
        window.renderEventModal();
      } else {
        console.error("renderEventModal not defined yet.");
        alert("The event system is still initializing. Please wait one moment.");
      }
    };
  </script>

  <script type="module">
    import { initUserProfile } from "./userprofile.js";
    document.addEventListener("DOMContentLoaded", () => {
      initUserProfile("#userProfile");
      
      const modal = document.getElementById('createEventModal');
      const openBtn = document.getElementById('openCreateEvent');
      
      openBtn.addEventListener('click', window.openCreateEvent);

      window.addEventListener('click', e => {
        if (e.target === modal) {
          modal.style.display = 'none';
        }
      });
    });
  </script>
