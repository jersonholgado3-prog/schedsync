<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile - SchedSync</title>
  <link rel="stylesheet" href="toast.css">
  <link rel="stylesheet" href="confirm-modal.css">
  <script src="toast.js"></script>
  <script type="module" src="profile.js"></script>
  <link rel="stylesheet" href="header-styles.css" />
  <script>
    (function () {
      // 1. Theme Lock 🌙
      const theme = localStorage.getItem("theme");
      if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
        document.documentElement.classList.add("dark");
      }

      // 2. UI Mode Lock 👔
      const uiMode = localStorage.getItem("uiMode");
      const userRole = localStorage.getItem("userRole");
      const mode = uiMode || ((userRole === 'teacher' || userRole === 'admin') ? 'professional' : 'student');
      if (mode === 'professional') {
        document.documentElement.classList.add("professional-mode");
      }
    })();
  </script>
  <link rel="stylesheet" href="profile_styles.css" />
</head>

<body>
  <div class="container">
    <aside class="sidebar">
      <div class="sidebar-header" onclick="window.location.href='homepage.html'">
        <img src="images/LOGO.png" alt="Logo">
      </div>
      <nav class="sidebar-menu">
        <a href="homepage.html" class="sidebar-link">
          <img src="images/HOME.png" alt="Home">
          <span>Home</span>
        </a>
        <a href="myschedule.html" class="sidebar-link">
          <img src="images/SCHED.png" alt="My Schedule">
          <span>My Schedule</span>
        </a>
        <a href="facultypage.html" class="sidebar-link">
          <img src="images/FACULTY.png" alt="Faculty">
          <span>Faculty</span>
        </a>
        <a href="campuspage.html" class="sidebar-link">
          <img src="images/CAMPUS_ONE.png" alt="Campus">
          <span>Campus</span>
        </a>
        <a href="sectionspage.html" class="sidebar-link">
          <img src="images/SECTIONS.png" alt="Sections">
          <span>Sections</span>
        </a>
        <a href="event.html" class="sidebar-link">
          <img src="images/EVENT_MODE.png" alt="Events">
          <span>Events</span>
        </a>
        <a href="curriculumpage.html" class="sidebar-link">
          <img src="images/CURRICULUM.png" alt="Curriculum">
          <span>Curriculum</span>
        </a>
        <!-- ADMIN ONLY 🛡️ -->
        <div id="adminSidebarLinks" style="display: none;">
                    <a href="archives.html" class="sidebar-link"><img src="images/ARCHIVE.png" alt="Archives"><span>Archives</span></a>
          <a href="audit_logs.html" class="sidebar-link">
            <img src="images/AUDIT.png" alt="Audit">
            <span>Audit Logs</span>
          </a>
        </div>
      </nav>
    </aside>

    <div class="main-content-wrapper">
      <!-- HEADER -->
      <header class="header">
        <div class="left-header">
          <div class="hamburger-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </div>
          <div class="logo-container" onclick="window.location.href='homepage.html'">
            <img src="images/BANNER.png" class="logo-img" alt="SchedSync Logo"
              style="max-height: 100%; width: 100%; object-fit: contain;">
          </div>
          <div class="search-wrapper">
            <img src="images/SEARCH.png" class="search-icon" alt="Search">
            <input type="text" class="search-button" placeholder="Search" aria-label="Search">
          </div>
        </div>

        <div class="page-title">My Profile</div>

        <div class="user-section">

          <div class="notification-icon-wrapper" onclick="window.openGameNotifications()">
            <img src="images/BELL.png" alt="Notifications">
          </div>
          <div class="user-profile-btn" id="userProfile">
            <span class="burger-icon">☰</span>
            <div class="user-name">User</div>
            <div class="user-avatar" id="headerAvatar">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                stroke="currentColor" style="width: 32px; height: 32px;">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15.75 6.75a3.75 3.75 0 1 1 -7.5 0 3.75 3.75 0 0 1 7.5 0zM4.5 20.25a8.25 8.25 0 0115 0" />
              </svg>
            </div>
          </div>
        </div>
      </header>

      <div class="main-layout">
        <main class="content-area p-8">

          <!-- Content Grid -->
          <div class="faculty-grid">

            <!-- CONTAINER 1: PROFILE INFO -->
            <div class="content-box">
              <div class="profile-content">
                <div class="profile-image">
                  <img src="images/default_shark.jpg" id="profileImg" onerror="this.src='images/default_shark.jpg'">
                </div>
                <div class="profile-details">
                  <div class="profile-name" id="userNameLarge">NAME</div>
                  <div class="divider-2"></div>
                  <div class="profile-info-line">
                    <span id="roleLabel">Info:</span>
                    <span id="roleValue">Loading...</span>
                  </div>
                  <div class="profile-info-line">
                    <span id="extraLabel">Role:</span>
                    <span id="extraValue">Loading...</span>
                  </div>
                </div>
              </div>
            </div>

            <!-- CONTAINER 2: SCHEDULE -->
            <div class="content-box">
              <div class="schedule-section" style="height: 100%; padding: 0;">
                <div class="table-scroll">
                  <table id="scheduleTable">
                    <colgroup>
                      <col class="time">
                    </colgroup>
                    <thead>
                      <tr>
                        <th>TIME</th>
                      </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>

      <div id="floatBtn" class="edit-button">
        <img src="images/EDIT.png" alt="Edit">

      <!-- CHANGE PASSWORD MODAL -->
      <div id="changePassModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:2000;">
        <div id="changePassBox" style="background:#fff;border:3px solid #000;border-radius:20px;box-shadow:6px 6px 0 #000;padding:2rem;width:90%;max-width:400px;display:flex;flex-direction:column;gap:14px;font-family:Poppins,sans-serif;">
          <div style="font-size:1.1rem;font-weight:800;text-transform:uppercase;">Change Password</div>
          <input type="password" id="cpCurrent" placeholder="Current Password" style="padding:10px 12px;border:2px solid #000;border-radius:10px;font-size:0.9rem;outline:none;width:100%;box-sizing:border-box;">
          <input type="password" id="cpNew" placeholder="New Password (min 6 chars)" style="padding:10px 12px;border:2px solid #000;border-radius:10px;font-size:0.9rem;outline:none;width:100%;box-sizing:border-box;">
          <input type="password" id="cpConfirm" placeholder="Confirm New Password" style="padding:10px 12px;border:2px solid #000;border-radius:10px;font-size:0.9rem;outline:none;width:100%;box-sizing:border-box;">
          <div style="display:flex;gap:10px;margin-top:4px;">
            <button id="cpCancelBtn" style="flex:1;padding:10px;border:2px solid #000;border-radius:10px;background:#f1f5f9;font-weight:700;cursor:pointer;">Cancel</button>
            <button id="cpSaveBtn" style="flex:1;padding:10px;border:2px solid #000;border-radius:10px;background:#000;color:#fff;font-weight:700;cursor:pointer;">Change</button>
          </div>
        </div>
      </div>
      <button id="changePassBtn" title="Change Password" style="position:fixed;bottom:6rem;right:1.5rem;width:56px;height:56px;border-radius:50%;border:3px solid #000;background:#fff;box-shadow:4px 4px 0 #000;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:1.4rem;z-index:40;">🔑</button>

      </div>
    </div>
    <script type="module" src="ui-effects.js"></script>
  <!-- ?? MOBILE BOTTOM NAVIGATION BAR ? -->
  <nav class="mobile-bottom-nav" id="mobileBottomNav">
    <a href="homepage.html" class="mob-nav-item" data-page="homepage">
      <img src="images/HOME.png" alt="Home"><span>Home</span>
    </a>
    <a href="myschedule.html" class="mob-nav-item" data-page="myschedule">
      <img src="images/SCHED.png" alt="My Schedule"><span>My Sched</span>
    </a>
    <a href="facultypage.html" class="mob-nav-item" data-page="facultypage">
      <img src="images/FACULTY.png" alt="Faculty"><span>Faculty</span>
    </a>
    <a href="campuspage.html" class="mob-nav-item" data-page="campuspage">
      <img src="images/CAMPUS_ONE.png" alt="Campus"><span>Campus</span>
    </a>
    <a href="sectionspage.html" class="mob-nav-item" data-page="sections">
      <img src="images/SECTIONS.png" alt="Sections">
      <span>Sections</span>
    </a>
    <a href="event.html" class="mob-nav-item" data-page="event">
      <img src="images/EVENT_MODE.png" alt="Events"><span>Events</span>
    </a>
    <a href="curriculumpage.html" class="mob-nav-item" data-page="curriculumpage">
      <img src="images/CURRICULUM.png" alt="Curriculum"><span>Curriculum</span>
    </a>
    <!-- ADMIN ONLY 🛡️ shown via JS -->
    <a href="audit_logs.html" class="mob-nav-item admin-only" data-page="audit_logs" style="display:none">
      <img src="images/AUDIT.png" alt="Audit Logs"><span>Audit</span>
    </a>
  </nav>
</body>

</html>
