<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280">
    <title>SchedSync - Audit Logs</title>
    <link rel="stylesheet" href="header-styles.css">
    <style>
        :root {
            --sti-blue: #005BAB;
            --sti-yellow: #FFD200;
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .audit-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .audit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 4px solid var(--sti-blue);
            padding-bottom: 20px;
        }

        .audit-header h1 {
            font-size: 32px;
            font-weight: 900;
            margin: 0;
            color: var(--sti-yellow);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .log-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .log-item {
            background: var(--card-dark);
            border: 2px solid #334155;
            border-radius: 16px;
            padding: 20px;
            display: grid;
            grid-template-columns: 80px 1fr 180px;
            gap: 20px;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .log-item:hover {
            border-color: var(--sti-blue);
            transform: translateX(10px);
            box-shadow: -5px 0 0 var(--sti-blue);
        }

        .log-icon {
            font-size: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f172a;
            width: 60px;
            height: 60px;
            border-radius: 12px;
        }

        .log-details {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .log-action {
            font-weight: 950;
            font-size: 14px;
            letter-spacing: 1px;
            padding: 4px 12px;
            border-radius: 6px;
            display: inline-block;
            width: fit-content;
            margin-bottom: 5px;
        }

        /* Action Colors */
        .action-SAVE_SCHEDULE {
            background: #1e3a8a;
            color: #60a5fa;
        }

        .action-PUBLISH_SCHEDULE {
            background: #064e3b;
            color: #34d399;
        }

        .action-DELETE_SCHEDULE {
            background: #450a0a;
            color: #f87171;
        }

        .action-UPDATE_CLASS {
            background: #3f2b00;
            color: #fbbf24;
        }

        .action-ADD_CLASS {
            background: #1e3a8a;
            color: #60a5fa;
        }

        .log-msg {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
        }

        .log-user {
            font-size: 13px;
            color: var(--text-dim);
            font-weight: 700;
        }

        .log-time {
            text-align: right;
            font-family: monospace;
            font-size: 13px;
            color: var(--text-dim);
        }

        .empty-logs {
            text-align: center;
            padding: 100px;
            font-size: 20px;
            color: var(--text-dim);
            font-weight: 800;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--sti-yellow);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 50px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="logo-container" onclick="window.location.href='homepage.html'">
            <img src="images/BANNER.png" class="logo-img" alt="SchedSync Logo">
        </div>
        <div class="user-section">
            <div class="user-profile-btn" id="userProfile">
                <div class="user-name">Admin</div>
                <div class="user-avatar" id="headerAvatar">👤</div>
            </div>
        </div>
    </header>

    <div class="audit-container">
        <div class="audit-header">
            <h1>🛡️ AUDIT LOGS</h1>
            <div id="logCount" style="font-weight: 900; color: var(--sti-blue);">Loading...</div>
        </div>

        <div id="loading" class="loading-spinner"></div>
        <div id="logList" class="log-list"></div>
    </div>

    <script type="module">
        import { db, auth } from "./js/config/firebase-config.js";
        import { collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { initUserProfile } from "./userprofile.js";

        document.addEventListener('DOMContentLoaded', () => {
            initUserProfile("#userProfile");

            onAuthStateChanged(auth, (user) => {
                if (!user) {
                    window.location.href = 'login.html';
                    return;
                }
                listenToLogs();
            });
        });

        function listenToLogs() {
            const listEl = document.getElementById('logList');
            const loading = document.getElementById('loading');
            const countEl = document.getElementById('logCount');

            const q = query(collection(db, "audit_logs"), orderBy("timestamp", "desc"), limit(100));

            onSnapshot(q, (snap) => {
                loading.style.display = 'none';
                listEl.innerHTML = '';
                countEl.textContent = `${snap.size} RECENT ENTRIES`;

                if (snap.empty) {
                    listEl.innerHTML = '<div class="empty-logs">No logs found. Everything is quiet... 🕶️</div>';
                    return;
                }

                snap.forEach(doc => {
                    const d = doc.data();
                    const logItem = document.createElement('div');
                    logItem.className = 'log-item';

                    const date = d.timestamp?.toDate() || new Date();
                    const timeStr = date.toLocaleString();

                    const icons = {
                        'SAVE_SCHEDULE': '💾',
                        'PUBLISH_SCHEDULE': '🚀',
                        'PUBLISH_GROUP': '📦',
                        'DELETE_SCHEDULE': '🗑️',
                        'DELETE_GROUP': '💥',
                        'UPDATE_CLASS': '✏️',
                        'ADD_CLASS': '➕',
                        'UNPUBLISH_GROUP': '🔒'
                    };

                    logItem.innerHTML = `
                        <div class="log-icon">${icons[d.action] || '📑'}</div>
                        <div class="log-details">
                            <span class="log-action action-${d.action}">${d.action}</span>
                            <span class="log-msg">${d.details}</span>
                            <span class="log-user">By ${d.userName} (${d.userEmail})</span>
                        </div>
                        <div class="log-time">${timeStr}</div>
                    `;
                    listEl.appendChild(logItem);
                });
            });
        }
    </script>
</body>

</html>
