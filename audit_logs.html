<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Core Links ⚓ -->
    <link rel="stylesheet" href="header-styles.css">
    <link rel="stylesheet" href="homepage.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        (function () {
            const theme = localStorage.getItem("theme");
            if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
                document.documentElement.classList.add("dark");
            }
            const uiMode = localStorage.getItem("uiMode") || 'professional';
            if (uiMode === 'professional') {
                document.documentElement.classList.add("professional-mode");
            }
        })();
    </script>
    

    <style>
        body { 
            display: none; 
            margin: 0;
            background-color: var(--bg-main);
        }
        
        .audit-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 25px;
            padding: 25px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* Stats Cards Section 📊 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 5px;
        }

        .stat-card {
            background: white;
            border: 3px solid black;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 6px 6px 0px black;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .dark .stat-card {
            background: #1e293b;
            border-color: #334155;
            box-shadow: 6px 6px 0px #000;
        }

        .stat-label {
            font-size: 0.75rem;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 900;
            color: #005BAB;
        }

        .dark .stat-value {
            color: #FFD200;
        }

        /* Filter Bar 🔍 */
        .filter-bar {
            background: white;
            border: 3px solid black;
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            gap: 20px;
            align-items: center;
            box-shadow: 6px 6px 0px black;
            margin-bottom: 5px;
        }

        .dark .filter-bar {
            background: #1e293b;
            border-color: #334155;
            box-shadow: 6px 6px 0px #000;
        }

        .search-input-group {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f1f5f9;
            border: 2px solid black;
            border-radius: 12px;
            padding: 8px 15px;
        }

        .dark .search-input-group {
            background: #0f172a;
            border-color: #334155;
        }

        .search-input-group input {
            border: none;
            background: transparent;
            width: 100%;
            font-family: inherit;
            font-weight: 600;
            color: inherit;
            outline: none;
        }

        .filter-select {
            padding: 8px 15px;
            border: 2px solid black;
            border-radius: 12px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            background: white;
        }

        /* Log List & Items 📑 */
        .log-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        .log-item {
            background: white;
            border: 1.5px solid #64748b;
            border-radius: 20px;
            padding: 1.25rem;
            display: flex;
            gap: 20px;
            align-items: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            cursor: pointer;
        }

        .log-item:hover {
            /* transform: translateY(-3px); -- REMOVED LIFTING EFFECT ⚓ */
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            border-color: #005BAB;
        }

        .dark .log-item {
            background: #1e293b;
            border-color: #334155;
        }

        .dark .log-item:hover {
            border-color: #FFD200;
            box-shadow: 0 10px 24px rgba(0,0,0,0.4);
        }

        .log-icon-box {
            width: 55px;
            height: 55px;
            background: #f1f5f9;
            border: 2px solid black;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
            box-shadow: 3px 3px 0px black;
        }

        .dark .log-icon-box {
            background: rgba(255, 255, 255, 0.05);
            border-color: #334155;
            box-shadow: 3px 3px 0px #000;
        }

        .log-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .log-header-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2px;
        }

        .log-action-badge {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 3px 10px;
            border-radius: 50px;
            border: 1.5px solid black;
            box-shadow: 2px 2px 0px black;
            width: fit-content;
        }

        .log-timestamp {
            font-size: 0.75rem;
            font-weight: 800;
            color: #64748b;
        }

        .log-message {
            font-size: 1.05rem;
            font-weight: 900;
            color: #0f172a;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dark .log-message {
            color: white;
        }

        .log-user-meta {
            font-size: 0.8rem;
            font-weight: 700;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Action Palette 🎨 */
        .action-SAVE_SCHEDULE, .action-ADD_CLASS, .action-PUBLISH_GROUP { background: #dbeafe; color: #1e40af; border-color: #1e40af; }
        .action-PUBLISH_SCHEDULE { background: #d1fae5; color: #065f46; border-color: #065f46; }
        .action-DELETE_SCHEDULE, .action-DELETE_GROUP, .action-DENY_PERMISSION { background: #fee2e2; color: #991b1b; border-color: #991b1b; }
        .action-UPDATE_CLASS, .action-REVOKE_PERMISSION { background: #fef3c7; color: #92400e; border-color: #92400e; }
        .action-UNPUBLISH_GROUP { background: #f1f5f9; color: #334155; border-color: #334155; }
        .action-ADD_CALENDAR_EVENT, .action-ACCEPT_PERMISSION { background: #dcfce7; color: #166534; border-color: #166534; }
        .action-DELETE_CALENDAR_EVENT { background: #fdf2f8; color: #9d174d; border-color: #9d174d; }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f1f5f9;
            border-top: 5px solid #005BAB;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 100px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 80px 40px;
            background: white;
            border: 3px solid black;
            border-radius: 20px;
            margin-top: 20px;
        }

        .dark .empty-state {
            background: #1e293b;
            border-color: #334155;
        }

        .professional-mode .log-item,
        .professional-mode .stat-card,
        .professional-mode .filter-bar,
        .professional-mode .widget-card {
            box-shadow: none !important;
            border-radius: 12px !important;
            border-width: 1.5px !important;
            transform: none !important;
        }
    </style>
</head>

        <div class="main-content-wrapper">
            <header class="header">
                <div class="left-header">

    <script type="module">
        import { db, auth } from "./js/config/firebase-config.js";
        import { collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { initUserProfile } from "./userprofile.js";

        document.addEventListener('DOMContentLoaded', () => {
            initUserProfile("#userProfile");

            onAuthStateChanged(auth, async (user) => {
                if (!user) {
                    window.location.href = 'index.html';
                    return;
                }
                const { doc, getDoc } = await import("https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js");
                const udoc = await getDoc(doc(db, "users", user.uid));
                const role = udoc.data()?.role;
                localStorage.setItem('userRole', role || 'student');
                if (role !== 'admin') {
                    alert("Access Denied: Admins Only 🛡️");
                    window.location.href = 'homepage.html';
                    return;
                }
                document.body.style.display = 'block';
                listenToLogs();
            });

            document.getElementById('logSearch').addEventListener('input', applyFilters);
            document.getElementById('actionFilter').addEventListener('change', applyFilters);
        });

        let allLogs = [];


        function listenToLogs() {
            const listEl = document.getElementById('logList');
            const loading = document.getElementById('loading');
            const statusEl = document.getElementById('logStatus');

            const q = query(collection(db, "audit_logs"), orderBy("timestamp", "desc"), limit(150));

            onSnapshot(q, (snap) => {
                const loadingEl = document.getElementById('loading');
                if (loadingEl) loadingEl.style.display = 'none';
                statusEl.textContent = `REAL-TIME: ${snap.size} ENTRIES`;
                
                allLogs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                // Update Stats
                const totalLogsEl = document.getElementById('totalLogs');
                if (totalLogsEl) totalLogsEl.textContent = snap.size;
                
                const criticalCount = allLogs.filter(l => l.action?.includes('DELETE') || l.action?.includes('REVOKE') || l.action?.includes('DENY')).length;
                const criticalEl = document.getElementById('criticalActions');
                if (criticalEl) criticalEl.textContent = criticalCount;
                
                const admins = new Set(allLogs.map(l => l.userEmail)).size;
                const activeAdminsEl = document.getElementById('activeAdmins');
                if (activeAdminsEl) activeAdminsEl.textContent = admins;

                applyFilters();
            });
        }

        function applyFilters() {
            const searchTerm = document.getElementById('logSearch').value.toLowerCase();
            const actionFilter = document.getElementById('actionFilter').value;

            const filtered = allLogs.filter(log => {
                const matchesSearch = (log.userName || "").toLowerCase().includes(searchTerm) || 
                                     (log.details || "").toLowerCase().includes(searchTerm) ||
                                     (log.action || "").toLowerCase().includes(searchTerm);
                
                let matchesCategory = true;
                if (actionFilter !== 'ALL') {
                    if (actionFilter === 'SCHEDULE') matchesCategory = (log.action || "").includes('SCHEDULE') || (log.action || "").includes('CLASS') || (log.action || "").includes('GROUP');
                    if (actionFilter === 'PERMISSION') matchesCategory = (log.action || "").includes('PERMISSION');
                    if (actionFilter === 'CALENDAR') matchesCategory = (log.action || "").includes('CALENDAR');
                }

                return matchesSearch && matchesCategory;
            });

            renderLogs(filtered);
        }

        function renderLogs(logs) {
            const listEl = document.getElementById('logList');
            listEl.innerHTML = '';

            if (logs.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 3rem; margin-bottom: 15px;">🔍</div>
                        <div style="font-weight: 900; font-size: 1.25rem;">No logs matched your filters</div>
                        <div style="color: #64748b; font-weight: 600;">Try broadening your search or selection.</div>
                    </div>
                `;
                return;
            }

            const icons = {
                'SAVE_SCHEDULE': '💾',
                'PUBLISH_SCHEDULE': '🚀',
                'PUBLISH_GROUP': '📦',
                'DELETE_SCHEDULE': '🗑️',
                'DELETE_GROUP': '💥',
                'UPDATE_CLASS': '✏️',
                'ADD_CLASS': '➕',
                'UNPUBLISH_GROUP': '🔒',
                'ADD_CALENDAR_EVENT': '📅',
                'DELETE_CALENDAR_EVENT': '🚫',
                'ACCEPT_PERMISSION': '✅',
                'DENY_PERMISSION': '❌',
                'REVOKE_PERMISSION': '🔐'
            };

            logs.forEach(d => {
                const logItem = document.createElement('div');
                logItem.className = 'log-item';

                const date = d.timestamp?.toDate ? d.timestamp.toDate() : (d.timestamp ? new Date(d.timestamp) : new Date());
                const timeStr = date.toLocaleString('en-US', { 
                    month: 'short', 
                    day: 'numeric', 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });

                logItem.innerHTML = `
                    <div class="log-icon-box">${icons[d.action] || '📑'}</div>
                    <div class="log-content">
                        <div class="log-header-meta">
                            <span class="log-action-badge action-${d.action}">${d.action}</span>
                            <span class="log-timestamp">${timeStr}</span>
                        </div>
                        <h3 class="log-message">${d.details}</h3>
                        <div class="log-user-meta">
                            <span>👤 ${d.userName}</span>
                            <span style="opacity: 0.5;">•</span>
                            <span>📧 ${d.userEmail}</span>
                        </div>
                    </div>
                `;
                listEl.appendChild(logItem);
            });
        }
    </script>
