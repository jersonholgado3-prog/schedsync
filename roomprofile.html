<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1280" />
    <title>Room Profile</title>
    <link rel="stylesheet" href="toast.css">
    <script src="toast.js"></script>
    <script type="module" src="role-restriction.js"></script>
    <script type="module" src="roomprofile.js"></script>
    <script>
        (function () {
            // 1. Theme Lock 🌙
            const theme = localStorage.getItem("theme");
            if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
                document.documentElement.classList.add("dark");
            }

            // 2. UI Mode Lock 👔
            const uiMode = localStorage.getItem("uiMode");
            const userRole = localStorage.getItem("userRole");
            const mode = uiMode || ((userRole === 'teacher' || userRole === 'admin') ? 'professional' : 'student');
            if (mode === 'professional') {
                document.documentElement.classList.add("professional-mode");
            }
        })();
    </script>
    <link rel="stylesheet" href="header-styles.css" />
    <link rel="stylesheet" href="maangas-styles.css" />
    <link rel="stylesheet" href="export-styles.css" />
    <link rel="stylesheet" href="roomprofile_styles.css" />
</head>

<body>
    <div class="container">
        <!-- HEADER -->
        <aside class="sidebar">
            <div class="sidebar-header" onclick="window.location.href='homepage.html'">
                <img src="images/LOGO.png" alt="Logo">
            </div>
            <nav class="sidebar-menu">
                <a href="homepage.html" class="sidebar-link">
                    <img src="images/HOME.png" alt="Home">
                    <span>Home</span>
                </a>
                <a href="newschedule.html" class="sidebar-link">
                    <img src="images/ADD_SCHED.png" alt="New Schedule">
                    <span>New Schedule</span>
                </a>
                <a href="myschedule.html" class="sidebar-link">
                    <img src="images/SCHED.png" alt="My Schedule">
                    <span>My Schedule</span>
                </a>
                <a href="facultypage.html" class="sidebar-link">
                    <img src="images/FACULTY.png" alt="Faculty">
                    <span>Faculty</span>
                </a>
                <a href="campuspage.html" class="sidebar-link active">
                    <img src="images/CAMPUS_ONE.png" alt="Campus">
                    <span>Campus</span>
                </a>
                <a href="event.html" class="sidebar-link">
                    <img src="images/EVENT_MODE.png" alt="Events">
                    <span>Events</span>
                </a>
            </nav>
        </aside>

        <div class="main-content-wrapper">
            <!-- HEADER -->
            <header class="header">
                <div class="left-header">
                    <div class="hamburger-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </div>
                    <div class="logo-container" onclick="window.location.href='homepage.html'">
                        <img src="images/BANNER.png" class="logo-img" alt="SchedSync Logo"
                            style="max-height: 100%; width: 100%; object-fit: contain;">
                    </div>
                    <div class="search-wrapper">
                        <img src="images/SEARCH.png" class="search-icon" alt="Search">
                        <input type="text" class="search-button" placeholder="Search pages" aria-label="Search">
                    </div>
                </div>

                <div class="page-title">SchedSync</div>

                <div class="user-section">
                    <div class="notification-icon-wrapper" onclick="window.openGameNotifications()">
                        <img src="images/BELL.png" alt="Notifications">
                    </div>
                    <div class="user-profile-btn" id="userProfile">
                        <span class="burger-icon">☰</span>
                        <div class="user-name">User</div>
                        <div class="user-avatar" id="headerAvatar">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                                stroke="currentColor" style="width: 32px; height: 32px;">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15.75 6.75a3.75 3.75 0 1 1 -7.5 0 3.75 3.75 0 0 1 7.5 0zM4.5 20.25a8.25 8.25 0 0 1 15 0" />
                            </svg>
                        </div>
                    </div>
                </div>
            </header>

            <div class="main-layout">
                <main class="content-area p-8">
                    <div class="faculty-grid">
                        <div class="content-box">
                            <div class="profile-content">
                                <div class="profile-image-container" id="roomImageContainer">
                                    <img src="images/PROFILE.png" id="roomImg" alt="Room Picture">
                                </div>
                                <div class="profile-details">
                                    <div
                                        style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 0.5rem;">
                                        <div class="profile-name" id="displayRoomName" style="margin-bottom:0;">Loading
                                            Room...</div>
                                        <button class="download-all-header-btn" id="downloadBtn"
                                            onclick="window.downloadSchedule()"
                                            style="display: flex; padding: 0.6rem 1.2rem; font-size: 0.75rem;">
                                            <span>DOWNLOAD SCHED</span>
                                            <span class="btn-emoji">💾</span>
                                        </button>
                                    </div>
                                    <div class="divider-2"></div>
                                    <div class="profile-info-line" id="capacityLabel"><span></span></div>
                                    <div class="profile-info-line" id="typeLabel"><span></span></div>
                                    <div id="occupancyContainer"></div>
                                </div>
                            </div>
                        </div>

                        <div class="content-box">
                            <div class="table-scroll">
                                <table id="scheduleTable">
                                    <colgroup>
                                        <col class="time">
                                    </colgroup>
                                    <thead>
                                        <tr>
                                            <th>TIME</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tbody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </main>
            </div>

        </div>
    </div>
    <script type="module" src="realtime-notifications.js"></script>
    <script type="module" src="ui-effects.js"></script>
    <script type="module" src="roomprofile.js"></script>
</body>

</html>
