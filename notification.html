    <!-- Changed title to Notifications -->
    <title>Notifications - SchedSync</title>
    <link rel="stylesheet" href="header-styles.css" />
    <script>
        (function () {
            // 1. Theme Lock 🌙
            const theme = localStorage.getItem("theme");
            if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
                document.documentElement.classList.add("dark");
            }

            // 2. UI Mode Lock 👔
            const uiMode = localStorage.getItem("uiMode");
            const userRole = localStorage.getItem("userRole");
            const mode = uiMode || ((userRole === 'teacher' || userRole === 'admin') ? 'professional' : 'student');
            if (mode === 'professional') {
                document.documentElement.classList.add("professional-mode");
            }
        })();
    </script>
    <link rel="stylesheet" href="notification_styles.css" />

            <div class="main-layout">
                <main class="content-area p-8"
                    style="margin-left: 0; width: 100%; height: auto; max-width: none; align-self: stretch;">
                    <!-- List Header -->
                    <div class="notification-list-header" style="align-items: center;">
                        <div class="circle-checkbox" id="selectAllCheckbox" title="Select All"></div>
                        <div class="col-from">From</div>
                        <div class="col-title">Title</div>
                        <div class="col-content">Content</div>
                        <div class="col-date">Date Posted</div>
                    </div>

                    <div id="notificationsContainer"></div>
                    <!-- React/Dynamic content will populate here -->

                    <div class="bottom-controls">
                        <div class="action-controls">
                            <button class="load-more-btn">Load More</button>
                            <div class="delete-btn-icon" id="deleteSelectedBtn" title="Delete Selected">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M3 6h18"></path>
                                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                                    <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                                </svg>
                            </div>
                        </div>
                        <!-- Updated create button text -->
                        <img src="images/PLUS.png" alt="Create Notification" class="create-notification-btn"
                            id="openNotificationModalBtn" />


                        <div class="modal-overlay" id="notificationModal">
                            <div class="container">
                                <div class="message-form">

                                    <div class="header">
                                        <div class="title">Create Notification</div>
                                        <button class="close-btn" onclick="closeModal()">×</button>
                                    </div>

                                    <div class="form-content">
                                        <div class="field-group">
                                            <div class="field-label">To</div>
                                            <input class="input-field" type="text" id="notifRecipient" placeholder="Recipients">
                                        </div>

                                        <div class="field-group">
                                            <div class="field-label">Title</div>
                                            <input class="input-field" type="text" id="notifTitle" placeholder="Notification title">
                                        </div>

                                        <div class="field-group message-field">
                                            <div class="field-label message-label">Message</div>
                                            <textarea class="textarea-field" id="notifMessage"
                                                placeholder="Type your message here..."></textarea>
                                        </div>

                                        <div class="field-group">
                                            <div class="field-label">Attachment (Image URL)</div>
                                            <div style="display: flex; gap: 10px; align-items: center;">
                                                <input class="input-field" type="text" id="notificationImageUrl" placeholder="https://example.com/image.jpg" style="flex: 1;">
                                                <div id="imagePreview" style="display: none; width: 50px; height: 50px; border: 2px solid black; border-radius: 8px; overflow: hidden; background: #eee;">
                                                    <img id="previewImg" src="" style="width: 100%; height: 100%; object-fit: cover;">
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="send-section">
                                        <button class="send-button">Send</button>
                                    </div>

                                </div>
                            </div>
                        </div>

                    </div>
            </div>
        </div>
