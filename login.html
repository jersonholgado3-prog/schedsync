<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SchedSync - Login</title>
  <script>
    (function () {
      // 1. Theme Lock 🌙 - Always Light for Login
      document.documentElement.classList.remove("dark");

      // 2. UI Mode Lock 👔
      const uiMode = localStorage.getItem("uiMode");
      const userRole = localStorage.getItem("userRole");
      const mode = uiMode || ((userRole === 'teacher' || userRole === 'admin') ? 'professional' : 'student');
      if (mode === 'professional') {
        document.documentElement.classList.add("professional-mode");
      }
    })();
  </script>
  <link rel="stylesheet" href="login.css" />
</head>

<body>
  <div class="container">
    <header class="header">
    </header>

    <main class="login-container">
      <h2>Login now</h2>

      <div id="notification" class="notification"></div>

      <form id="loginForm">
        <label for="username">Email or Username</label>
        <input type="text" id="username" name="username" required>

        <label for="password">Password</label>
        <div class="password-input-wrapper">
          <input type="password" id="password" name="password" required>
          <div class="password-toggle" id="togglePassword">
            <!-- Lucide Eye Off Icon (hidden) -->
            <svg xmlns="http://www.w3.org/2000/svg" class="eye-off" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
              <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path>
              <path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path>
              <line x1="2" y1="2" x2="22" y2="22"></line>
            </svg>
            <!-- Lucide Eye Icon (visible) -->
            <svg xmlns="http://www.w3.org/2000/svg" class="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </div>
        </div>

        <a href="forgotpass.html" class="forgot-password">Forgot Password?</a>

        <button type="submit">Log In</button>
      </form>

      <div style="margin-top: 1.5rem; margin-bottom: 1.5rem;" class="divider"></div>
      <p class="signup-text">Don't Have an Account?</p>
      <button type="button" class="signup-button" onclick="window.location.href='signup.html'">Sign Up</button>
    </main>
  </div>

  <script type="module" src="login.js" defer></script>
  <script type="module" src="ui-effects.js"></script>
</body>

</html>
