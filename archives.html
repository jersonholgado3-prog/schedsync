<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archives - SchedSync</title>
  <link rel="stylesheet" href="header-styles.css">
  <link rel="stylesheet" href="archives_styles.css">
  <link rel="stylesheet" href="toast.css">
  <link rel="stylesheet" href="confirm-modal.css">
  <script>
    (function () {
      const theme = localStorage.getItem("theme");
      if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
        document.documentElement.classList.add("dark");
      }
      const uiMode = localStorage.getItem("uiMode");
      const userRole = localStorage.getItem("userRole");
      const mode = uiMode || ((userRole === 'teacher' || userRole === 'admin') ? 'professional' : 'student');
      if (mode === 'professional') document.documentElement.classList.add("professional-mode");
    })();
  </script>
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="sidebar-header" onclick="window.location.href='homepage.html'">
        <img src="images/LOGO.png" alt="Logo">
      </div>
      <nav class="sidebar-menu">
        <a href="homepage.html" class="sidebar-link"><img src="images/HOME.png" alt="Home"><span>Home</span></a>
        <a href="myschedule.html" class="sidebar-link"><img src="images/SCHED.png" alt="My Schedule"><span>My Schedule</span></a>
        <a href="facultypage.html" class="sidebar-link"><img src="images/FACULTY.png" alt="Faculty"><span>Faculty</span></a>
        <a href="campuspage.html" class="sidebar-link"><img src="images/CAMPUS_ONE.png" alt="Campus"><span>Campus</span></a>
        <a href="sectionspage.html" class="sidebar-link"><img src="images/SECTIONS.png" alt="Sections"><span>Sections</span></a>
        <a href="event.html" class="sidebar-link"><img src="images/EVENT_MODE.png" alt="Events"><span>Events</span></a>
        <a href="curriculumpage.html" class="sidebar-link"><img src="images/CURRICULUM.png" alt="Curriculum"><span>Curriculum</span></a>
        <a href="archives.html" class="sidebar-link active"><img src="images/ARCHIVE.png" alt="Archives"><span>Archives</span></a>
        <div id="adminSidebarLinks" style="display: none;">
          <a href="audit_logs.html" class="sidebar-link"><img src="images/AUDIT.png" alt="Audit"><span>Audit Logs</span></a>
        </div>
      </nav>
    </aside>

    <div class="main-content-wrapper">
      <header class="header">
        <div class="left-header">
          <div class="hamburger-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </div>
          <div class="logo-container" onclick="window.location.href='homepage.html'">
            <img src="images/BANNER.png" class="logo-img" alt="SchedSync Logo" style="max-height:100%;width:100%;object-fit:contain;">
          </div>
        </div>
        <div class="page-title">Archives</div>
        <div class="user-section">
          <div class="notification-icon-wrapper" onclick="window.openGameNotifications()">
            <img src="images/BELL.png" alt="Notifications">
          </div>
          <div class="user-profile-btn" id="userProfile">
            <span class="burger-icon">☰</span>
            <div class="user-name">User</div>
            <div class="user-avatar" id="headerAvatar">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width:32px;height:32px;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6.75a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0zM4.5 20.25a8.25 8.25 0 0 1 15 0"/>
              </svg>
            </div>
          </div>
        </div>
      </header>
      
      <main class="archives-main">
        <div class="archives-header">
          <h1>Archives</h1>
          <div class="archive-stats" id="archiveStats">
            <span id="totalArchives">0</span> items • <span id="storageUsed">0 MB</span>
          </div>
        </div>

        <!-- Warning Banner -->
        <div class="archive-warning" id="archiveWarning" style="display: none;">
          ⚠️ Archives approaching storage limit. Consider exporting old data.
          <button onclick="exportAllArchives()" class="export-btn-small">Export Now</button>
        </div>

        <!-- Auto-cleanup Info -->
        <div class="archive-info">
          ℹ️ Archives older than 3 years are automatically exported and removed.
          <button onclick="exportAllArchives()" class="export-btn-small">Export All</button>
        </div>

        <!-- Tabs -->
        <div class="archive-tabs">
          <button class="tab-btn active" data-type="schedules">Schedules</button>
          <button class="tab-btn" data-type="faculty">Faculty</button>
          <button class="tab-btn" data-type="sections">Sections</button>
          <button class="tab-btn" data-type="curriculum">Curriculum</button>
          <button class="tab-btn" data-type="events">Events</button>
        </div>

        <!-- Search & Filters -->
        <div class="archive-controls">
          <input type="text" id="searchInput" placeholder="🔍 Search archives..." class="search-input">
          <select id="yearFilter" class="filter-select">
            <option value="">All Years</option>
          </select>
          <select id="sortFilter" class="filter-select">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
          </select>
        </div>

        <!-- Archive List -->
        <div id="archiveSelectionBar" style="display:none;align-items:center;gap:12px;padding:10px 16px;background:#1e293b;border-radius:12px;margin-bottom:12px;color:white;font-weight:700;">
          <input type="checkbox" id="selectAllArchives" style="width:18px;height:18px;cursor:pointer;" title="Select All" onchange="toggleSelectAllArchives(this.checked)">
          <span id="archiveSelectedCount">0 Selected</span>
          <button onclick="bulkRestoreArchives()" style="padding:6px 14px;background:#22c55e;color:white;border:2px solid black;border-radius:8px;font-weight:700;cursor:pointer;">Restore</button>
          <button onclick="bulkDeleteArchives()" style="padding:6px 14px;background:#ef4444;color:white;border:2px solid black;border-radius:8px;font-weight:700;cursor:pointer;">🗑️ Delete</button>
          <button onclick="clearArchiveSelection()" style="padding:6px 14px;background:#64748b;color:white;border:2px solid black;border-radius:8px;font-weight:700;cursor:pointer;">Cancel</button>
        </div>
        <div class="archive-list" id="archiveList">
          <div class="loading">Loading archives...</div>
        </div>
      </main>
    </div>
  </div>

  <div id="toast-container"></div>
  <div id="confirm-modal-container"></div>

  <script type="module" src="ui-effects.js"></script>
  <script type="module" src="role-restriction.js"></script>
  <script type="module" src="realtime-notifications.js"></script>
  <script type="module" src="archives.js"></script>
  <script type="module" src="toast.js"></script>
  <script type="module" src="confirm-modal.js"></script>
</body>
</html>
