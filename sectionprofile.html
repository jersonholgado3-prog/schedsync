<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Section Profile - SchedSync</title>
    <link rel="stylesheet" href="toast.css">
    <script src="toast.js"></script>
    <script type="module" src="role-restriction.js"></script>
    <script type="module" src="sectionprofile.js"></script>
    <script>
        (function () {
            const theme = localStorage.getItem("theme");
            if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
                document.documentElement.classList.add("dark");
            }
            const uiMode = localStorage.getItem("uiMode");
            const userRole = localStorage.getItem("userRole");
            const mode = uiMode || ((userRole === 'teacher' || userRole === 'admin') ? 'professional' : 'student');
            if (mode === 'professional') {
                document.documentElement.classList.add("professional-mode");
            }
        })();
    </script>
    <link rel="stylesheet" href="header-styles.css" />
    <link rel="stylesheet" href="maangas-styles.css" />
    <link rel="stylesheet" href="export-styles.css" />
    <link rel="stylesheet" href="roomprofile_styles.css" />
</head>

<body>

        <aside class="sidebar">
            <div class="sidebar-header" onclick="window.location.href='homepage.html'">
                <img src="images/LOGO.png" alt="Logo">
            </div>

          <img src="images/FACULTY.png" alt="Faculty">
          <span>Faculty</span>
        </a>
        <a href="campuspage.html" class="sidebar-link">
          <img src="images/CAMPUS_ONE.png" alt="Campus">
          <span>Campus</span>
        </a>
        <a href="sectionspage.html" class="sidebar-link active">
          <img src="images/SCHED.png" alt="Sections">
          <span>Sections</span>
        </a>
        <a href="event.html" class="sidebar-link">
          <img src="images/EVENT_MODE.png" alt="Events">
          <span>Events</span>
        </a>
        <a href="curriculumpage.html" class="sidebar-link">
          <img src="images/SCHED.png" alt="Curriculum" style="filter: hue-rotate(180deg);">
          <span>Curriculum</span>
        </a>
        <!-- ADMIN ONLY 🛡️ -->
        <div id="adminSidebarLinks" style="display: none;">
                    <a href="archives.html" class="sidebar-link"><img src="images/ARCHIVE.png" alt="Archives"><span>Archives</span></a>
          <a href="audit_logs.html" class="sidebar-link">
            <img src="images/AUDIT.png" alt="Audit">
            <span>Audit Logs</span>
          </a>
        </div>
      </nav>
        </aside>

        <div class="main-content-wrapper">
            <header class="header">
                <div class="left-header">
                    <div class="hamburger-btn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </div>
                    <div class="logo-container" onclick="window.location.href='homepage.html'">
                        <img src="images/BANNER.png" class="logo-img" alt="SchedSync Logo"
                            style="max-height: 100%; width: 100%; object-fit: contain;">
                    </div>
                    <div class="search-wrapper">
                        <img src="images/SEARCH.png" class="search-icon" alt="Search">
                        <input type="text" class="search-button" placeholder="Search" aria-label="Search">
                    </div>
                </div>

                <div class="page-title">Section Profile</div>

                <div class="user-section">
                    <div class="notification-icon-wrapper" onclick="window.openGameNotifications()">
                        <img src="images/BELL.png" alt="Notifications">
                    </div>
                    <div class="user-profile-btn" id="userProfile">
                        <div class="user-name">User</div>
                        <div class="user-avatar" id="headerAvatar">
                            <img src="images/default_shark.jpg" alt="User" style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                    </div>
                </div>
            </header>

            <div class="main-layout">
                <main class="content-area p-8">
                    <div class="faculty-grid">
                        <div class="content-box">
                            <div class="profile-content">
                                <div class="profile-image-container" id="sectionImageContainer">
                                    <img src="images/PROFILE.png" id="sectionImg" alt="Section Picture">
                                </div>
                                <div class="profile-details">
                                    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 0.5rem;">
                                        <div class="profile-name" id="displaySectionName">Loading Section...</div>
                                        <button class="download-all-header-btn" id="downloadBtn" style="display: flex; padding: 0.6rem 1.2rem; font-size: 0.75rem;">
                                            <span>DOWNLOAD SCHED</span>
                                            <span class="btn-emoji">💾</span>
                                        </button>
                                    </div>
                                    <div class="divider-2"></div>
                                    <div class="profile-info-line" id="strandLabel"><span></span></div>
                                    <div class="profile-info-line" id="gradeLabel"><span></span></div>
                                    <div id="credentialSection" class="admin-only" style="display: none; margin-top: 1rem; padding: 1rem; background: #f1f5f9; border: 2px dashed black; border-radius: 12px;">
                                        <div class="text-xs font-black uppercase text-slate-500 mb-2">Section Account (Admin Only)</div>
                                        <div class="profile-info-line" id="emailLabel" style="font-size: 0.9rem;"><span></span></div>
                                        <div class="profile-info-line" id="passwordLabel" style="font-size: 0.9rem;"><span></span></div>
                                        <button id="resetSectionPassBtn" style="margin-top:0.75rem;padding:6px 14px;border:2px solid #ef4444;border-radius:8px;font-weight:800;font-size:12px;cursor:pointer;background:#fef2f2;color:#ef4444;box-shadow:2px 2px 0 #000;">Reset Password</button>

                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="content-box mt-8">
                            <h3 class="text-xl mb-6 flex items-center gap-2">
                                📅 Weekly Class Schedule
                            </h3>
                            <div id="sectionScheduleContainer" class="space-y-4">
                                <div class="loading-state text-center py-10 opacity-50">Fetching schedule...</div>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script type="module" src="ui-effects.js"></script>
  <nav class="mobile-bottom-nav" id="mobileBottomNav">

    <a href="curriculumpage.html" class="mob-nav-item" data-page="curriculumpage">
      <img src="images/SCHED.png" alt="Curriculum" style="filter: hue-rotate(180deg);"><span>Curriculum</span>
    </a>
    <!-- ADMIN ONLY 🛡️ shown via JS -->
    <a href="audit_logs.html" class="mob-nav-item admin-only" data-page="audit_logs" style="display:none">
      <img src="images/SCHED.png" alt="Audit Logs" style="filter: hue-rotate(180deg);"><span>Audit</span>
    </a>
  </nav>
</body>
</html>

</html>
